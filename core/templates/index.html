{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ t.titulo }} | Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700&family=Alex+Brush&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('{% static "img/man-barbershop-salon-doing-haircut-beard-trim.jpg" %}') no-repeat center center fixed; 
            background-size: cover; color: white; min-height: 100vh; font-family: 'Montserrat', sans-serif;
        }

        /* BUSCA NO CANTO SUPERIOR ESQUERDO */
        .search-container { position: absolute; top: 30px; left: 30px; z-index: 100; }
        .search-box { background: rgba(0,0,0,0.5); border: 2px solid #ff6600; border-radius: 20px; color: white; padding: 5px 15px; outline: none; width: 220px; }

        /* BANDEIRAS E GESTÃO NO CANTO SUPERIOR DIREITO */
        .top-right { position: absolute; top: 30px; right: 30px; display: flex; align-items: center; gap: 15px; z-index: 100; }
        .lang-btn { background: none; border: none; padding: 0; cursor: pointer; }
        .lang-icon { width: 28px; border-radius: 3px; transition: 0.3s; }
        
        /* BOTÃO GESTÃO - COR DE REFERÊNCIA */
        .btn-gestao { background: #ffc107; color: black; font-weight: bold; border-radius: 10px; padding: 8px 25px; text-decoration: none; text-transform: uppercase; font-family: 'Orbitron', sans-serif; font-size: 0.85rem;}

        /* HEADER */
        header { padding-top: 100px; text-align: center; }
        
        /* BARBER SHOP NA COR DO BOTÃO GESTÃO (#ffc107) */
        .brand-name { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 6.5rem; 
            letter-spacing: 8px; 
            color: #ffc107; /* AMARELO IGUAL À GESTÃO */
            margin: 0; 
            line-height: 0.9; 
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8); 
        }
        
        /* SLOGAN COM RELÓGIO NA DIREITA */
        .slogan-area { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 10px;
        }
        .brand-slogan { font-size: 2.5rem; font-weight: 300; margin: 0; display: flex; align-items: center; }
        .exclusivo-highlight { font-family: 'Alex Brush', cursive; color: #ffc107; font-size: 5.5rem; margin-right: 15px; text-shadow: 2px 2px 5px black; }

        /* RELÓGIO MENOR NA DIREITA */
        .relogio-container { 
            background: rgba(0,0,0,0.7); 
            border: 2px solid #ff6600; 
            border-radius: 10px; 
            padding: 5px 15px; 
            box-shadow: 0 0 10px #ff6600;
        }
        #relogio { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #ff6600; }

        /* CARDS */
        .servico-card { 
            background: rgba(0,0,0,0.85); border: 4px solid #ff6600; border-radius: 20px; padding: 30px; text-align: center; 
            transition: 0.4s; box-shadow: 0 0 20px rgba(255,102,0,0.2);
        }
        .servico-card:hover { transform: translateY(-10px); box-shadow: 0 0 30px #ff6600; }
        .servico-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem; color: #fff; margin-bottom: 5px; }
        .servico-price { font-family: 'Bebas Neue', sans-serif; color: #ff6600; font-size: 4.2rem; margin-bottom: 20px; }

        .btn-agendar { 
            background: #ff6600; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; 
            padding: 12px; border-radius: 10px; width: 100%; display: block; text-decoration: none; transition: 0.3s;
        }
        .btn-agendar:hover { background: #fff; color: #ff6600; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="{{ t.busca }}">
    </div>

    <div class="top-right">
        <form method="POST" class="d-flex gap-2">
            {% csrf_token %}
            <button name="language" value="pt-br" class="lang-btn"><img src="https://flagcdn.com/h24/br.png" class="lang-icon"></button>
            <button name="language" value="en" class="lang-btn"><img src="https://flagcdn.com/h24/us.png" class="lang-icon"></button>
            <button name="language" value="es" class="lang-btn"><img src="https://flagcdn.com/h24/es.png" class="lang-icon"></button>
        </form>
        <a href="{% url 'painel' %}" class="btn-gestao">{{ t.gestao }}</a>
    </div>

    <header>
        <h1 class="brand-name">{{ t.titulo }}</h1>
        
        <div class="slogan-area">
            <p class="brand-slogan">
                <span class="exclusivo-highlight">{{ t.exclusivo }}</span> 
                <span style="font-family: 'Bebas Neue'; letter-spacing: 3px;">{{ t.slogan }}</span>
            </p>
            
            <div class="relogio-container">
                <div id="relogio">00:00:00</div>
            </div>
        </div>
    </header>

    <div class="container my-5">
        <div class="row g-5">
            {% for s in servicos %}
            <div class="col-md-4">
                <div class="servico-card">
                    <h3 class="servico-title">{{ s.nome }}</h3>
                    <p class="servico-price">R$ {{ s.preco }}</p>
                    <a href="{% url 'agendar' %}?servico_id={{ s.id }}" class="btn-agendar">{{ t.agendar }}</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function up() { document.getElementById('relogio').textContent = new Date().toLocaleTimeString('pt-BR'); }
        setInterval(up, 1000); up();
    </script>
</body>
</html>
