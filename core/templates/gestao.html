{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; }
        .quadro { background: rgba(255,255,255,0.05); border: 1px solid #ffc107; border-radius: 15px; padding: 20px; }
        .btn-yellow { background: #ffc107; color: black; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div class="container py-4">
        <a href="{% url 'index' %}" class="btn btn-outline-warning mb-4">← VOLTAR PARA O SITE</a>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="quadro">
                    <h3>SERVIÇOS</h3>
                    {% for s in servicos %}<p>{{ s.nome }} - R$ {{ s.preco }}</p>{% endfor %}
                    <button class="btn btn-yellow w-100" data-bs-toggle="modal" data-bs-target="#modalServico">+ Novo Serviço</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="quadro">
                    <h3>CLIENTES</h3>
                    {% for c in clientes %}<p>{{ c.nome }}</p>{% endfor %}
                    <button class="btn btn-yellow w-100" data-bs-toggle="modal" data-bs-target="#modalCliente">+ Novo Cliente</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
