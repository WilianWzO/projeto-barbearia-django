{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcar Horário | Barber Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: #121212; color: white;">

    <div class="container my-5 text-center" style="max-width: 500px;">
        <h1 class="text-yellow fw-bold mb-4" style="letter-spacing: 2px;">MARCAR HORÁRIO</h1>

        <form action="{% url 'agendar' %}" method="POST" class="p-4" style="background-color: #1e1e1e; border: 1px solid #ffc107; border-radius: 15px;">
            {% csrf_token %}

            <div class="mb-4 text-start">
                <label class="form-label text-yellow small fw-bold">QUEM É O CLIENTE?</label>
                <select name="cliente" class="form-control" style="background: #121212; color: white; border: 1px solid #444;" required>
                    <option value="" disabled selected>Selecione o cliente...</option>
                    {% for cliente in clientes %}
                        <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label text-yellow small fw-bold">QUAL É O SERVIÇO?</label>
                <select name="servico" class="form-control" style="background: #121212; color: white; border: 1px solid #444;" required>
                    <option value="" disabled selected>Selecione o corte...</option>
                    {% for servico in servicos %}
                        <option value="{{ servico.id }}">{{ servico.nome }} - R$ {{ servico.preco }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label text-yellow small fw-bold">DIA E HORÁRIO</label>
                <input type="datetime-local" name="data_hora" class="form-control" style="background: #121212; color: white; border: 1px solid #444;" required>
            </div>

            <button type="submit" class="btn-yellow w-100 py-3 fw-bold mb-3">CONFIRMAR AGENDAMENTO</button>
            
            <a href="{% url 'index' %}" class="text-decoration-none opacity-75" style="color: white; font-size: 0.9rem;">Voltar para o início</a>
        </form>
    </div>

</body>
</html>
