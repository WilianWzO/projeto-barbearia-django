<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Agendamento - Barbearia Wilian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1a1a1a; color: white; padding-top: 50px; }</style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card bg-dark p-4 border-warning">
                <h2 class="text-center text-warning mb-4">Marcar Horário</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-warning w-100 mt-3">Confirmar Agendamento</button>
                    <a href="{% url 'home' %}" class="btn btn-outline-light w-100 mt-2">Voltar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
